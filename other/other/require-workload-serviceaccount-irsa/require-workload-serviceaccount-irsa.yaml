apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-workload-serviceaccount-irsa
  annotations:
    policies.kyverno.io/title: Require Workload ServiceAccount IRSA Annotation
    policies.kyverno.io/category: AWS, EKS Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: ServiceAccount
    policies.kyverno.io/minversion: 1.6.0
    kyverno.io/kyverno-version: 1.11.0
    kyverno.io/kubernetes-version: "1.24-1.30"
    policies.kyverno.io/description: >-
      In EKS clusters, workloads that require AWS API access should use IAM Roles
      for Service Accounts (IRSA) rather than relying on the EC2 instance profile
      assigned to the worker node. IRSA provides fine-grained, least-privilege
      IAM permissions scoped to individual ServiceAccounts via the
      eks.amazonaws.com/role-arn annotation. Without this annotation, pods can
      inherit the broad permissions of the node's instance profile, violating the
      principle of least privilege. This policy requires that any ServiceAccount
      carrying the label `aws-access: "true"` must have the
      eks.amazonaws.com/role-arn annotation set to a non-empty value, ensuring
      IRSA is explicitly configured before AWS-dependent workloads are deployed.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-irsa-annotation
      match:
        any:
          - resources:
              kinds:
                - ServiceAccount
              selector:
                matchLabels:
                  aws-access: "true"
      validate:
        message: >-
          ServiceAccounts that require AWS access must have the
          eks.amazonaws.com/role-arn annotation set. Using IRSA instead of
          node instance profiles enforces least-privilege access to AWS
          services. Annotate this ServiceAccount with an appropriate IAM
          role ARN: eks.amazonaws.com/role-arn: arn:aws:iam::<account-id>:role/<role-name>
        pattern:
          metadata:
            annotations:
              eks.amazonaws.com/role-arn: "arn:aws:iam::?*"
