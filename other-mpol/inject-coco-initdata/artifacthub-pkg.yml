name: inject-coco-initdata
version: 1.0.0
displayName: Inject CoCo InitData Annotation
createdAt: "2026-04-08T00:00:00Z"
description: >-
  Injects the CoCo initdata annotation into pods with the label coco=enabled and reference to an initdata ConfigMap. Retrieves initdata from the specified ConfigMap and injects it as the io.katacontainers.config.runtime.cc_init_data annotation.
install: |-
  ```shell
  kubectl apply -f https://raw.githubusercontent.com/kyverno/policies/main/other-mpol/inject-coco-initdata/inject-coco-initdata.yaml
  ```
keywords:
  - kyverno
  - Confidential Computing
  - MutatingPolicy
readme: |
  Injects the CoCo initdata annotation into pods with the label coco=enabled and reference to an initdata ConfigMap. Retrieves initdata from the specified ConfigMap and injects it as the io.katacontainers.config.runtime.cc_init_data annotation.
  
  Refer to the documentation for more details on Kyverno annotations: https://artifacthub.io/docs/topics/annotations/kyverno/
annotations:
  kyverno/category: "Confidential Computing"
  kyverno/subject: "Pod"
